<!DOCTYPE html>
<html>
<head>
  <title>Giveaway Entry</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; }
    input, button { padding: 10px; margin: 10px; width: 200px; }
    #form, #adminPanel { display: none; }
  </style>
</head>
<body>

<h2>Enter Access Code</h2>
<input type="password" id="codeInput" placeholder="Enter Code">
<button onclick="checkCode()">Submit</button>

<div id="form">
  <h3>Enter Details</h3>

  <!-- ✅ FORM SPREE CONNECTED -->
  <form action="https://formspree.io/f/mjgjjzjv" method="POST">
    <input type="text" name="name" placeholder="Your Name" required><br>
    <input type="text" name="number" placeholder="Phone Number" required><br>
    <button type="submit">Submit</button>
  </form>

</div>

<hr>

<h3>Admin Panel</h3>
<input type="password" id="adminPass" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>

<div id="adminPanel">
  <h3>All Entries</h3>
  <p>👉 Check entries in Formspree dashboard</p>
</div>

<script>
  const ACCESS_CODE = "blazeronin";
  const ADMIN_PASS = "admin2006";

  function checkCode() {
    let code = document.getElementById("codeInput").value;
    if(code === ACCESS_CODE) {
      document.getElementById("form").style.display = "block";
    } else {
      alert("Wrong Code!");
    }
  }

  function adminLogin() {
    let pass = document.getElementById("adminPass").value;

    if(pass === ADMIN_PASS) {
      document.getElementById("adminPanel").style.display = "block";
    } else {
      alert("Wrong Password!");
    }
  }
</script>

</body>
</html>
